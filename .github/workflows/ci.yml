name: CI/CD - Telco Churn Prediction API

# Disparadores: se ejecuta en push a main/develop y en pull requests hacia main
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint - Verifica estilo de código
  # ─────────────────────────────────────────────
  lint:
    name: "Lint con flake8"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Instalar flake8
        run: pip install flake8

      - name: Ejecutar flake8 sobre app/api.py
        run: |
          flake8 app/api.py \
            --max-line-length=120 \
            --ignore=E501,W503,E402 \
            --statistics

  # ─────────────────────────────────────────────
  # Job 2: Test - Ejecuta pruebas unitarias
  # ─────────────────────────────────────────────
  test:
    name: "Tests con pytest"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar tests con pytest
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # Job 3: Build - Construye imagen Docker
  # Solo se ejecuta si lint y test pasan
  # ─────────────────────────────────────────────
  build:
    name: "Build Docker Image"
    runs-on: ubuntu-latest
    needs: [ lint, test ]

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Construir imagen Docker
        run: docker build -t telco-churn-api:latest .

      - name: Verificar imagen construida
        run: docker images telco-churn-api:latest

      - name: Ejecutar contenedor para prueba de humo
        run: |
          docker run -d --name test-container -p 8000:8000 telco-churn-api:latest
          sleep 35
          curl --fail http://localhost:8000/health || (docker logs test-container && exit 1)
          docker stop test-container
          docker rm test-container
